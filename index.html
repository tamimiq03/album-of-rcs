      .main-content {

      :root {

        --rcs-red-light: #fee2e2;
        --rcs-gray-50: #fafafa;
        --rcs-gray-100: #f4f4f5;
        --rcs-gray-200: #e4e4e7;
        --rcs-gray-600: #52525b;
        --rcs-gray-800: #27272a;

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @keyframes heartbeat {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }
      .animate-up {
        animation: fadeUp 0.6s ease forwards;
      }
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease;
        opacity: 1;
      }
      .loading-overlay.hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loading-logo {
        width: 100px;
        height: 100px;
        background: white;
        border-radius: 30px;

        justify-content: center;
        margin: 0 auto 1.5rem;
        animation: heartbeat 1.2s ease infinite;
        overflow: hidden;

        width: 80px;
        height: 80px;
        object-fit: cover;
      }
      .loading-text {
        color: white;
        font-size: 1.3rem;
        font-weight: 600;
        text-align: center;
      }

        width: 40px;
        height: 40px;

        border-radius: 50%;

      }

        background: linear-gradient(135deg, #dc2626, #991b1b);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
      }
      .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
      }

        color: var(--rcs-gray-800);
        transition: var(--transition);
        font-size: 0.9rem;
        position: relative;
        cursor: pointer;
      }
      .nav-links a::after {
        content: "";
        position: absolute;
        bottom: -6px;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--rcs-red);
        transition: width 0.25s ease;
      }
      .nav-links a:hover::after,
      .nav-links a.active::after {
        width: 100%;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--rcs-red);
      }
      .menu-icon {
        display: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--rcs-red);
      }

        .nav-links {
          display: none;
          width: 100%;
          flex-direction: column;
          text-align: center;
          padding: 1.2rem 0;
          gap: 1rem;
        }
        .nav-links.show {
          display: flex;
        }
        .menu-icon {
          display: block;
        }
        .nav-container {
          padding: 0.8rem 1.5rem;
        }
      }
      .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 2rem 2rem 3rem;
      }

        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        background: var(--rcs-red);
        color: white;
        padding: 0.75rem 2rem;
        border-radius: 50px;
        font-weight: 500;
        font-size: 0.9rem;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;

        background: var(--rcs-red-dark);
        transform: translateY(-2px);

        padding: 0.4rem 1rem;
        font-size: 0.8rem;
        background: #3b82f6;
      }

        text-align: center;
        padding: 2rem 1rem 3rem;

        max-width: 120px;

        display: block;
        border-radius: 28px;

      .hero-logo {

        font-weight: 800;
        background: linear-gradient(135deg, #dc2626, #7f1d1d);

        -webkit-background-clip: text;
        color: transparent;
        margin-bottom: 0.5rem;

        padding: 1.8rem;
        border-radius: 32px;

        overflow-wrap: break-word;

        margin-bottom: 1rem;

          grid-template-columns: repeat(2, 1fr);
        }

      @media (max-width: 480px) {
        .grid-gallery {
          grid-template-columns: 1fr;

      async function saveToJSONBin() {
        const dataToSave = {
          teachers: globalData.teachers,
          notices: globalData.notices,
          gallery: globalData.gallery,
          ratings: globalData.ratings,
          homeContent,
          aboutContent,
          footerContent,
          lastUpdated: new Date().toISOString(),
        };
        try {
          await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.BIN_ID}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "X-Master-Key": JSONBIN_CONFIG.API_KEY,
            },
            body: JSON.stringify(dataToSave),
          });
          console.log("✅ JSONBin এ সেভ হয়েছে");
        } catch (e) {
          console.warn(e);
        }
        localStorage.setItem("rcs_backup", JSON.stringify(dataToSave));
      }

      async function loadFromJSONBin() {
        try {
          const res = await fetch(
            `https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.BIN_ID}/latest`,
            { headers: { "X-Master-Key": JSONBIN_CONFIG.API_KEY } },
          );
          if (res.ok) {
            const data = (await res.json()).record;
            globalData.teachers = data.teachers?.length
              ? data.teachers
              : DEFAULT_DATA.teachers;
            globalData.notices = data.notices?.length
              ? data.notices
              : DEFAULT_DATA.notices;
            globalData.gallery = data.gallery?.length
              ? data.gallery
              : DEFAULT_DATA.gallery;
            globalData.ratings = data.ratings || [];
            homeContent = data.homeContent || DEFAULT_DATA.homeContent;
            aboutContent = data.aboutContent || DEFAULT_DATA.aboutContent;
            footerContent = data.footerContent || DEFAULT_DATA.footerContent;
          } else throw new Error();
        } catch (e) {
          const local = localStorage.getItem("rcs_backup");
          if (local) {
            const d = JSON.parse(local);
            globalData.teachers = d.teachers || DEFAULT_DATA.teachers;
            globalData.notices = d.notices || DEFAULT_DATA.notices;
            globalData.gallery = d.gallery || DEFAULT_DATA.gallery;
            globalData.ratings = d.ratings || [];
            homeContent = d.homeContent || DEFAULT_DATA.homeContent;
            aboutContent = d.aboutContent || DEFAULT_DATA.aboutContent;
            footerContent = d.footerContent || DEFAULT_DATA.footerContent;
          } else {
            globalData.teachers = DEFAULT_DATA.teachers;
            globalData.notices = DEFAULT_DATA.notices;
            globalData.gallery = DEFAULT_DATA.gallery;
            globalData.ratings = [];
            homeContent = DEFAULT_DATA.homeContent;
            aboutContent = DEFAULT_DATA.aboutContent;
            footerContent = DEFAULT_DATA.footerContent;
          }
        }
        finishLoading();
      }

      let autoTimer;
      function autoSync() {
        if (autoTimer) clearTimeout(autoTimer);
        autoTimer = setTimeout(() => saveToJSONBin(), 2000);
      }
      function fileToBase64(file) {
        return new Promise((resolve) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result);
          r.readAsDataURL(file);
        });
      }
      function generateId() {
        return (
          Date.now().toString(36) + Math.random().toString(36).substr(2, 6)
        );
      }

      function addTeacher(d) {
        globalData.teachers.unshift({ id: generateId(), ...d });
        render();
        autoSync();
      }
      function updateTeacher(id, d) {
        let idx = globalData.teachers.findIndex((t) => t.id === id);
        if (idx !== -1) {
          globalData.teachers[idx] = { ...globalData.teachers[idx], ...d };
          render();
          autoSync();
        }
      }
      function deleteTeacher(id) {
        globalData.teachers = globalData.teachers.filter((t) => t.id !== id);

      const ADMIN_EMAIL = "albumofrcs@gmail.com";
      const ADMIN_PASSWORD = "albumofrcs@12#";

      function adminLogin(email, password) {
        // Check if locked
        if (Date.now() < loginLockTime)
          return {
            success: false,
            message: "Too many attempts. Try after 5 minutes.",
          };

        if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
          loginAttempts = 0;
          localStorage.setItem("admin_auth", "true");
          localStorage.setItem("admin_login_time", Date.now().toString());
          localStorage.setItem("admin_email", email);
          adminLogged = true;
          return { success: true };
        }

        loginAttempts++;
        if (loginAttempts >= 5) {
          loginLockTime = Date.now() + 300000; // 5 minutes lock
          loginAttempts = 0;
          return {
            success: false,
            message: "Too many failed attempts. Locked for 5 minutes.",
          };
        }
        return { success: false, message: "Invalid email or password" };
      }

      function adminLogout() {
        localStorage.removeItem("admin_auth");
        localStorage.removeItem("admin_login_time");
        localStorage.removeItem("admin_email");
        adminLogged = false;
        navigate("home");
      }

      function checkAdminSession() {
        const auth = localStorage.getItem("admin_auth");
        const loginTime = localStorage.getItem("admin_login_time");
        if (auth === "true" && loginTime) {
          // Session expires after 30 minutes
          if (Date.now() - parseInt(loginTime) < 1800000) {
            adminLogged = true;
          } else {
            localStorage.removeItem("admin_auth");
            localStorage.removeItem("admin_login_time");
            localStorage.removeItem("admin_email");
            adminLogged = false;
          }
        } else {
          adminLogged = false;
        }
        return adminLogged;
      }
      checkAdminSession();

      function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        let t = document.createElement("div");
        t.className = "copy-toast";
        t.innerHTML = `<i class="fas fa-check-circle"></i> ${text} copied!`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
      }
      function showFullImage(url) {
        let modal = document.getElementById("imageModal");
        let img = document.getElementById("modalImage");
        if (modal && img) {
          img.src = url;
          modal.classList.add("active");
        }
      }
      function closeModal() {
        document.getElementById("imageModal")?.classList.remove("active");
      }
      function navigate(route) {
        currentRoute = route;
        window.location.hash = route;
        render();
      }
      window.addEventListener("hashchange", () => {
        let hash = window.location.hash.slice(1) || "home";
        // #login or #admin both go to admin panel
        if (hash === "login") hash = "admin";
        currentRoute = hash;
        render();
      });

      function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, (m) =>
          m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;",
        );
      }

      function renderHome() {
        return `<div class="hero animate-up"><img class="hero-logo-img" src="logo.png" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23dc2626%22/%3E%3Ctext x=%2250%22 y=%2267%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22 font-weight=%22bold%22%3ER%3C/text%3E%3C/svg%3E'"><div class="hero-logo">Album of RCS</div><div class="hero-sub">${escapeHtml(homeContent)}</div><button class="btn" onclick="navigate('nostalgia')">Explore Memories <i class="fas fa-arrow-right"></i></button></div>`;
      }
      function renderAbout() {
        return `<div class="animate-up"><h1>About Rajshahi Collegiate School</h1><div class="about-box">${escapeHtml(aboutContent)}</div></div>`;
      }
      function renderNostalgia() {
        return `<div><h1>Nostalgia Gallery</h1><div class="grid-gallery">${globalData.gallery.map((img) => `<div class="card" onclick="showFullImage('${img.url}')"><img class="card-img" src="${img.url}" alt="${img.title}"><div class="caption"><strong>${escapeHtml(img.title)}</strong></div></div>`).join("")}</div></div>`;
      }
      function renderTeachers() {
        return `<div><h1>Mentors (${globalData.teachers.length})</h1><div class="grid-gallery">${globalData.teachers.map((t) => `<div class="card"><img class="card-img" src="${t.photo}" onerror="this.src='https://randomuser.me/api/portraits/lego/1.jpg'"><div class="teacher-info"><h3>${escapeHtml(t.name)}</h3><p><i class="fas fa-user-tie"></i> ${escapeHtml(t.designation)}</p><p onclick="copyToClipboard('${t.phone}')"><i class="fas fa-phone"></i> ${escapeHtml(t.phone || "N/A")} <span style="font-size:9px;">(click)</span></p></div></div>`).join("")}</div></div>`;
      }
      function renderNotices() {
        return `<div><h1>Notice Board</h1>${globalData.notices.map((n) => `<div class="notice-card" data-id="${n.id}"><div class="notice-title"><span><i class="fas fa-bullhorn" style="color:var(--rcs-red)"></i> ${escapeHtml(n.title)}</span><span class="notice-badge"><i class="far fa-calendar-alt"></i> ${n.date}</span></div><div class="notice-detail" id="detail-${n.id}"><p>${escapeHtml(n.description)}</p>${n.image ? `<img src="${n.image}" class="notice-img" onclick="event.stopPropagation(); showFullImage('${n.image}')">` : ""}</div></div>`).join("")}</div>`;
      }
      function renderRatings() {
        return `<div><h1>Community Voices</h1><div style="background:var(--rcs-gray-50); border-radius:28px; padding:2rem; margin-bottom:2rem;"><h3>Leave a Memory</h3><form id="reviewForm"><input type="text" id="revName" placeholder="Full name" required><input type="text" id="revSchool" placeholder="School" required><input type="text" id="revBatch" placeholder="SSC Batch"><textarea rows="3" id="revReview" placeholder="Your nostalgic memory..." required></textarea><button type="submit" class="btn">Share Memory</button></form></div><h2>Recent Reflections</h2>${globalData.ratings.map((r) => `<div class="rating-card"><div><strong>${escapeHtml(r.name)}</strong> • Batch ${escapeHtml(r.batch || "—")} • ${escapeHtml(r.school)}</div><p>${escapeHtml(r.review)}</p><small>${new Date(r.createdAt).toLocaleDateString()}</small></div>`).join("") || "<p style='text-align:center'>Be the first to share.</p>"}</div>`;
      }
      function renderFooter() {
        return `<footer class="premium-footer"><div class="footer-content"><div class="footer-brand"><h3>Album of RCS</h3><p>${escapeHtml(footerContent)}</p></div><div class="footer-social"><a href="mailto:albumofrcs@gmail.com"><i class="fas fa-envelope"></i></a><a href="https://instagram.com/albumofrcs" target="_blank"><i class="fab fa-instagram"></i></a><a href="https://facebook.com/albumofrcs" target="_blank"><i class="fab fa-facebook-f"></i></a></div></div><div class="footer-bottom"><p>Website by <a href="https://instagram.com/tamimiq_" target="_blank">Tamim Iqbal</a></p></div></footer>`;
      }

      function renderAdmin() {
        if (!adminLogged) {
          return `<div class="animate-up"><div class="login-card"><h2><i class="fas fa-shield-alt" style="color:var(--rcs-red);"></i> Admin Login</h2><form id="adminLoginForm"><input type="email" id="adminEmail" placeholder="Email address" required><input type="password" id="adminPass" placeholder="Password" required><button type="submit" class="btn" style="width:100%;">Login</button><div id="loginError" class="error-message"></div></form></div></div>`;
        }
        return `<div class="admin-container animate-up"><div class="admin-header"><h1><i class="fas fa-shield-alt"></i> Admin Dashboard</h1><button class="admin-logout" id="logoutAdminBtn">Logout</button></div><div class="admin-tabs"><button class="admin-tab active" data-tab="home-tab">Home/About</button><button class="admin-tab" data-tab="teachers-tab">Teachers (${globalData.teachers.length})</button><button class="admin-tab" data-tab="notices-tab">Notices (${globalData.notices.length})</button><button class="admin-tab" data-tab="gallery-tab">Gallery (${globalData.gallery.length})</button><button class="admin-tab" data-tab="ratings-tab">Ratings (${globalData.ratings.length})</button><button class="admin-tab" data-tab="footer-tab">Footer</button></div><div id="home-tab" class="admin-section active"><div class="admin-card"><h3>Home Content</h3><textarea id="homeEditArea" rows="4" style="width:100%;border-radius:20px;padding:12px;">${escapeHtml(homeContent)}</textarea><button id="saveHomeBtn" class="btn btn-sm" style="margin-top:1rem;">Update Home</button></div><div class="admin-card"><h3>About Content</h3><textarea id="aboutEditArea" rows="6" style="width:100%;border-radius:20px;padding:12px;">${escapeHtml(aboutContent)}</textarea><button id="saveAboutBtn" class="btn btn-sm">Update About</button></div></div><div id="teachers-tab" class="admin-section"><div class="admin-card"><h3>Add New Teacher</h3><button id="showTeacherFormBtn" class="btn btn-sm">+ Show Form</button><div id="addTeacherForm" class="edit-form"><input id="teacherName" placeholder="Name"><input id="teacherDesignation" placeholder="Designation"><input id="teacherPhone" placeholder="Phone"><input id="teacherPhotoUrl" placeholder="Image URL"><input type="file" id="teacherPhotoUpload"><button id="addTeacherBtn" class="btn btn-sm">Save</button></div></div><div class="admin-card"><h3>Current Teachers</h3><div id="teacherList">${globalData.teachers.map((t) => `<div class="item-card"><div><strong>${escapeHtml(t.name)}</strong><br><small>${escapeHtml(t.designation)}</small></div><div><button class="edit-btn" onclick="window.editTeacherModal('${t.id}')">Edit</button><button class="delete-btn" onclick="window.deleteTeacherItem('${t.id}')">Delete</button></div></div><div id="edit-form-${t.id}" class="edit-form"><input id="edit-name-${t.id}" value="${escapeHtml(t.name)}"><input id="edit-des-${t.id}" value="${escapeHtml(t.designation)}"><input id="edit-phone-${t.id}" value="${escapeHtml(t.phone || "")}"><input id="edit-photo-${t.id}" value="${escapeHtml(t.photo || "")}"><button class="btn btn-sm" onclick="window.updateTeacherFinal('${t.id}')">Update</button></div>`).join("")}</div></div></div><div id="notices-tab" class="admin-section"><div class="admin-card"><h3>Add New Notice</h3><button id="showNoticeFormBtn" class="btn btn-sm">+ Show Form</button><div id="addNoticeForm" class="edit-form"><input id="noticeTitle" placeholder="Title"><textarea id="noticeDesc" rows="2" placeholder="Description"></textarea><input type="file" id="noticeImage"><input type="date" id="noticeDate"><button id="addNoticeBtn" class="btn btn-sm">Save</button></div></div><div class="admin-card"><h3>Current Notices</h3><div id="noticeList">${globalData.notices.map((n) => `<div class="item-card"><div><strong>${escapeHtml(n.title)}</strong><br><small>${n.date}</small></div><div><button class="edit-btn" onclick="window.editNoticeModal('${n.id}')">Edit</button><button class="delete-btn" onclick="window.deleteNoticeItem('${n.id}')">Delete</button></div></div><div id="edit-notice-${n.id}" class="edit-form"><input id="edit-notice-title-${n.id}" value="${escapeHtml(n.title)}"><textarea id="edit-notice-desc-${n.id}">${escapeHtml(n.description)}</textarea><input type="date" id="edit-notice-date-${n.id}" value="${n.date}"><button class="btn btn-sm" onclick="window.updateNoticeFinal('${n.id}')">Update</button></div>`).join("")}</div></div></div><div id="gallery-tab" class="admin-section"><div class="admin-card"><h3>Add New Image</h3><button id="showGalleryFormBtn" class="btn btn-sm">+ Upload</button><div id="addGalleryForm" class="edit-form"><input type="file" id="galleryFile"><input id="galleryTitle" placeholder="Image Title"><button id="addGalleryBtn" class="btn btn-sm">Upload</button></div></div><div class="admin-card"><h3>Gallery Items</h3><div id="galleryList">${globalData.gallery.map((g) => `<div class="item-card"><div><img src="${g.url}" style="width:40px;height:40px;object-fit:cover;border-radius:8px;"> ${escapeHtml(g.title)}</div><div><button class="edit-btn" onclick="window.editGalleryModal('${g.id}')">Edit</button><button class="delete-btn" onclick="window.deleteGalleryItem('${g.id}')">Delete</button></div></div><div id="edit-gallery-${g.id}" class="edit-form"><input id="edit-gallery-title-${g.id}" value="${escapeHtml(g.title)}"><button class="btn btn-sm" onclick="window.updateGalleryFinal('${g.id}')">Update Title</button></div>`).join("")}</div></div></div><div id="ratings-tab" class="admin-section"><div class="admin-card"><h3>Manage User Ratings (${globalData.ratings.length})</h3><div>${globalData.ratings.map((r) => `<div class="item-card"><div><strong>${escapeHtml(r.name)}</strong>: ${escapeHtml(r.review.substring(0, 60))}...</div><button class="delete-btn" onclick="window.deleteRatingItem('${r.id}')">Delete</button></div>`).join("") || "<p>No ratings yet.</p>"}</div><button id="deleteAllRatingsBtn" class="btn btn-sm" style="background:#b91c1c;">Delete All Ratings</button></div></div><div id="footer-tab" class="admin-section"><div class="admin-card"><h3>Footer Text</h3><textarea id="footerEditArea" rows="3" style="width:100%;border-radius:20px;padding:12px;">${escapeHtml(footerContent)}</textarea><button id="saveFooterBtn" class="btn btn-sm">Update Footer</button></div></div></div>`;
      }

      window.editTeacherModal = (id) =>
        document.getElementById(`edit-form-${id}`)?.classList.toggle("show");
      window.updateTeacherFinal = (id) => {
        let name = document.getElementById(`edit-name-${id}`).value,
          des = document.getElementById(`edit-des-${id}`).value,
          phone = document.getElementById(`edit-phone-${id}`).value,
          photo = document.getElementById(`edit-photo-${id}`).value;
        updateTeacher(id, { name, designation: des, phone, photo });
      };
      window.deleteTeacherItem = (id) => {
        if (confirm("Delete?")) deleteTeacher(id);
      };
      window.editNoticeModal = (id) =>
        document.getElementById(`edit-notice-${id}`)?.classList.toggle("show");
      window.updateNoticeFinal = (id) => {
        let title = document.getElementById(`edit-notice-title-${id}`).value,
          desc = document.getElementById(`edit-notice-desc-${id}`).value,
          date = document.getElementById(`edit-notice-date-${id}`).value;
        updateNotice(id, { title, description: desc, date });
      };
      window.deleteNoticeItem = (id) => {
        if (confirm("Delete?")) deleteNotice(id);
      };
      window.editGalleryModal = (id) =>
        document.getElementById(`edit-gallery-${id}`)?.classList.toggle("show");
      window.updateGalleryFinal = (id) => {
        let title = document.getElementById(`edit-gallery-title-${id}`).value;
        updateGalleryItem(id, { title });
      };
      window.deleteGalleryItem = (id) => {
        if (confirm("Delete?")) deleteGalleryItem(id);
      };
      window.deleteRatingItem = (id) => {
        if (confirm("Delete?")) deleteRating(id);
      };
      window.copyToClipboard = copyToClipboard;
      window.showFullImage = showFullImage;
      window.closeModal = closeModal;
      window.navigate = navigate;

      function render() {
        if (isLoading) return;
        let mainHTML = "";
        if (currentRoute === "home") mainHTML = renderHome();
        else if (currentRoute === "about") mainHTML = renderAbout();
        else if (currentRoute === "nostalgia") mainHTML = renderNostalgia();
        else if (currentRoute === "teachers") mainHTML = renderTeachers();
        else if (currentRoute === "notices") mainHTML = renderNotices();
        else if (currentRoute === "ratings") mainHTML = renderRatings();
        else if (currentRoute === "admin") mainHTML = renderAdmin();
        else mainHTML = renderHome();

        const full = `<nav class="navbar"><div class="nav-container"><div class="logo"><h2>Album of RCS</h2></div><div class="menu-icon" id="menuToggle"><i class="fas fa-bars"></i></div><ul class="nav-links" id="navLinks"><li><a onclick="navigate('home')">Home</a></li><li><a onclick="navigate('about')">About</a></li><li><a onclick="navigate('nostalgia')">Nostalgia</a></li><li><a onclick="navigate('teachers')">Teachers</a></li><li><a onclick="navigate('notices')">Notices</a></li><li><a onclick="navigate('ratings')">Ratings</a></li></ul></div></nav><div class="container main-content">${mainHTML}</div>${renderFooter()}<div id="imageModal" class="image-modal" onclick="closeModal()"><span class="close-modal">&times;</span><img id="modalImage" class="modal-img"></div>`;
        document.getElementById("app").innerHTML = full;

        document.querySelectorAll(".notice-card").forEach((card) => {
          card.addEventListener("click", (e) => {
            if (e.target.classList.contains("notice-img")) return;
            card.querySelector(".notice-detail")?.classList.toggle("show");
          });
        });
        document
          .getElementById("reviewForm")
          ?.addEventListener("submit", (e) => {
            e.preventDefault();
            addRating({
              name: document.getElementById("revName").value,
              school: document.getElementById("revSchool").value,
              batch: document.getElementById("revBatch").value,
              review: document.getElementById("revReview").value,
            });
            e.target.reset();
          });
        if (adminLogged) {
          document
            .getElementById("saveHomeBtn")
            ?.addEventListener("click", () =>
              setHomeContent(document.getElementById("homeEditArea").value),
            );
          document
            .getElementById("saveAboutBtn")
            ?.addEventListener("click", () =>
              setAboutContent(document.getElementById("aboutEditArea").value),
            );
          document
            .getElementById("saveFooterBtn")
            ?.addEventListener("click", () =>
              setFooterContent(document.getElementById("footerEditArea").value),
            );
          document
            .getElementById("showTeacherFormBtn")
            ?.addEventListener("click", () =>
              document
                .getElementById("addTeacherForm")
                .classList.toggle("show"),
            );
          document
            .getElementById("addTeacherBtn")
            ?.addEventListener("click", async () => {
              let name = document.getElementById("teacherName").value,
                des = document.getElementById("teacherDesignation").value,
                phone = document.getElementById("teacherPhone").value,
                url = document.getElementById("teacherPhotoUrl").value,
                file = document.getElementById("teacherPhotoUpload").files[0];
              let photo =
                url || "https://randomuser.me/api/portraits/lego/1.jpg";
              if (file) photo = await fileToBase64(file);
              addTeacher({ name, designation: des, phone, photo });
            });
          document
            .getElementById("showNoticeFormBtn")
            ?.addEventListener("click", () =>
              document.getElementById("addNoticeForm").classList.toggle("show"),
            );
          document
            .getElementById("addNoticeBtn")
            ?.addEventListener("click", async () => {
              let title = document.getElementById("noticeTitle").value,
                desc = document.getElementById("noticeDesc").value,
                date = document.getElementById("noticeDate").value,
                file = document.getElementById("noticeImage").files[0];
              let image = file ? await fileToBase64(file) : "";
              addNotice({
                title,
                description: desc,
                image,
                date: date || new Date().toISOString().slice(0, 10),
              });
            });
          document
            .getElementById("showGalleryFormBtn")
            ?.addEventListener("click", () =>
              document
                .getElementById("addGalleryForm")
                .classList.toggle("show"),
            );
          document
            .getElementById("addGalleryBtn")
            ?.addEventListener("click", async () => {
              let file = document.getElementById("galleryFile").files[0];
              if (!file) return;
              let url = await fileToBase64(file);
              let title =
                document.getElementById("galleryTitle").value || "Memory";
              addGalleryItem({ url, title });
            });
          document
            .getElementById("deleteAllRatingsBtn")
            ?.addEventListener("click", () => {
              if (confirm("Delete all ratings?")) deleteAllRatings();
            });
          document
            .getElementById("logoutAdminBtn")
            ?.addEventListener("click", () => adminLogout());
          document.querySelectorAll(".admin-tab").forEach((tab) => {
            tab.addEventListener("click", () => {
              document
                .querySelectorAll(".admin-tab")
                .forEach((t) => t.classList.remove("active"));
              tab.classList.add("active");
              document
                .querySelectorAll(".admin-section")
                .forEach((s) => s.classList.remove("active"));
              document.getElementById(tab.dataset.tab).classList.add("active");
            });
          });
        }
        document
          .getElementById("adminLoginForm")
          ?.addEventListener("submit", (e) => {
            e.preventDefault();
            let email = document.getElementById("adminEmail").value;
            let pass = document.getElementById("adminPass").value;
            let result = adminLogin(email, pass);
            if (result.success) render();
            else
              document.getElementById("loginError").innerText = result.message;
          });
        document
          .getElementById("menuToggle")
          ?.addEventListener("click", () =>
            document.getElementById("navLinks").classList.toggle("show"),
          );
      }

      function finishLoading() {
        isLoading = false;
        render();
        document.getElementById("loadingOverlay")?.classList.add("hide");
        setTimeout(() => {
          let ov = document.getElementById("loadingOverlay");
          if (ov) ov.style.display = "none";
        }, 500);
      }
      loadFromJSONBin();
    </script>
  </body>
</html>
